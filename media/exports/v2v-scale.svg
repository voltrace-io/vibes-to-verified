<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">

    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2329" stroke-width="1" opacity="0.45"/>
      </pattern>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="7" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#58636B"/>
        <stop offset="0.35" stop-color="#55D8FF"/>
        <stop offset="1" stop-color="#42F59E"/>
      </linearGradient>
      <style>
        .sans { font-family: 'Segoe UI', Arial, sans-serif; }
        .mono { font-family: 'Cascadia Mono', 'Consolas', monospace; }
        .caps { letter-spacing: 3px; }
      </style>
    </defs>

    <rect width="1600" height="900" fill="#090B0D"/>
    <rect width="1600" height="900" fill="url(#grid)"/>

      <text x="90" y="88" class="mono caps" font-size="19" fill="#42F59E">VIBES TO VERIFIED / EVIDENCE MATURITY</text>
      <text x="90" y="180" class="sans" font-size="70" font-weight="750" fill="#F2F0E9">confidence is not evidence.</text>
      <text x="90" y="235" class="sans" font-size="28" fill="#87939C">authority should rise only when the evidence does.</text>

        <g>
          <rect x="90" y="330" width="260" height="250" rx="22" fill="#11161A" stroke="#69757D" stroke-width="2"/>
          <rect x="90" y="330" width="260" height="8" rx="4" fill="#69757D"/>
          <text x="118" y="402" class="mono" font-size="38" font-weight="700" fill="#69757D">V0</text>
          <text x="118" y="455" class="sans caps" font-size="22" font-weight="700" fill="#F2F0E9">VIBES</text>
          <line x1="118" y1="486" x2="322" y2="486" stroke="#1A2329" stroke-width="2"/>
          <text x="118" y="535" class="sans" font-size="20" fill="#87939C">a claim exists</text>
        </g>
        <path d="M 357 455.0 L 371 455.0" stroke="#87939C" stroke-width="3"/><path d="M 367 449.0 L 375 455.0 L 367 461.0" fill="none" stroke="#87939C" stroke-width="3"/>
        <g>
          <rect x="378" y="330" width="260" height="250" rx="22" fill="#11161A" stroke="#6896A8" stroke-width="2"/>
          <rect x="378" y="330" width="260" height="8" rx="4" fill="#6896A8"/>
          <text x="406" y="402" class="mono" font-size="38" font-weight="700" fill="#6896A8">V1</text>
          <text x="406" y="455" class="sans caps" font-size="22" font-weight="700" fill="#F2F0E9">GROUNDED</text>
          <line x1="406" y1="486" x2="610" y2="486" stroke="#1A2329" stroke-width="2"/>
          <text x="406" y="535" class="sans" font-size="20" fill="#87939C">sources + artifacts</text>
        </g>
        <path d="M 645 455.0 L 659 455.0" stroke="#87939C" stroke-width="3"/><path d="M 655 449.0 L 663 455.0 L 655 461.0" fill="none" stroke="#87939C" stroke-width="3"/>
        <g>
          <rect x="666" y="330" width="260" height="250" rx="22" fill="#11161A" stroke="#55D8FF" stroke-width="2"/>
          <rect x="666" y="330" width="260" height="8" rx="4" fill="#55D8FF"/>
          <text x="694" y="402" class="mono" font-size="38" font-weight="700" fill="#55D8FF">V2</text>
          <text x="694" y="455" class="sans caps" font-size="22" font-weight="700" fill="#F2F0E9">TESTED</text>
          <line x1="694" y1="486" x2="898" y2="486" stroke="#1A2329" stroke-width="2"/>
          <text x="694" y="535" class="sans" font-size="20" fill="#87939C">repeatable criteria</text>
        </g>
        <path d="M 933 455.0 L 947 455.0" stroke="#87939C" stroke-width="3"/><path d="M 943 449.0 L 951 455.0 L 943 461.0" fill="none" stroke="#87939C" stroke-width="3"/>
        <g>
          <rect x="954" y="330" width="260" height="250" rx="22" fill="#11161A" stroke="#59E7C2" stroke-width="2"/>
          <rect x="954" y="330" width="260" height="8" rx="4" fill="#59E7C2"/>
          <text x="982" y="402" class="mono" font-size="38" font-weight="700" fill="#59E7C2">V3</text>
          <text x="982" y="455" class="sans caps" font-size="22" font-weight="700" fill="#F2F0E9">ADVERSARIAL</text>
          <line x1="982" y1="486" x2="1186" y2="486" stroke="#1A2329" stroke-width="2"/>
          <text x="982" y="535" class="sans" font-size="20" fill="#87939C">independent refutation</text>
        </g>
        <path d="M 1221 455.0 L 1235 455.0" stroke="#87939C" stroke-width="3"/><path d="M 1231 449.0 L 1239 455.0 L 1231 461.0" fill="none" stroke="#87939C" stroke-width="3"/>
        <g>
          <rect x="1242" y="330" width="260" height="250" rx="22" fill="#11161A" stroke="#42F59E" stroke-width="2"/>
          <rect x="1242" y="330" width="260" height="8" rx="4" fill="#42F59E"/>
          <text x="1270" y="402" class="mono" font-size="38" font-weight="700" fill="#42F59E">V4</text>
          <text x="1270" y="455" class="sans caps" font-size="22" font-weight="700" fill="#F2F0E9">OPERATIONAL</text>
          <line x1="1270" y1="486" x2="1474" y2="486" stroke="#1A2329" stroke-width="2"/>
          <text x="1270" y="535" class="sans" font-size="20" fill="#87939C">natural path + read-back</text>
        </g>

      <rect x="90" y="660" width="1420" height="2" fill="url(#accentLine)"/>
      <text x="90" y="730" class="sans" font-size="26" fill="#F2F0E9">verdict and evidence maturity are separate.</text>
      <text x="90" y="780" class="mono" font-size="22" fill="#87939C">RED / V4 can be more rigorous than GREEN / V0.</text>
      <text x="1510" y="844" text-anchor="end" class="mono caps" font-size="17" fill="#42F59E">MAKE YOUR AGENTS PROVE IT.</text>

    </svg>
