<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">

    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2329" stroke-width="1" opacity="0.45"/>
      </pattern>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="7" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#58636B"/>
        <stop offset="0.35" stop-color="#55D8FF"/>
        <stop offset="1" stop-color="#42F59E"/>
      </linearGradient>
      <style>
        .sans { font-family: 'Segoe UI', Arial, sans-serif; }
        .mono { font-family: 'Cascadia Mono', 'Consolas', monospace; }
        .caps { letter-spacing: 3px; }
      </style>
    </defs>

    <rect width="1280" height="640" fill="#090B0D"/>
    <rect width="1280" height="640" fill="url(#grid)"/>

      <circle cx="1130" cy="115" r="190" fill="#42F59E" opacity="0.08" filter="url(#glow)"/>
      <text x="80" y="82" class="mono caps" font-size="17" fill="#42F59E">OPEN-SOURCE AGENT SKILL</text>
      <text x="80" y="190" class="sans" font-size="78" font-weight="800" fill="#F2F0E9">vibes to verified</text>
      <text x="80" y="260" class="sans" font-size="34" fill="#87939C">make your agents prove it.</text>
      <rect x="80" y="320" width="1120" height="3" fill="url(#accentLine)"/>
      <text x="80" y="382" class="sans" font-size="23" fill="#F2F0E9">keep the speed. add the proof.</text>

          <rect x="80" y="445" width="196" height="78" rx="14" fill="#11161A" stroke="#69757D" stroke-width="2"/>
          <text x="100" y="478" class="mono" font-size="18" font-weight="700" fill="#69757D">V0</text>
          <text x="100" y="507" class="sans caps" font-size="14" font-weight="700" fill="#F2F0E9">VIBES</text>

          <rect x="305" y="445" width="196" height="78" rx="14" fill="#11161A" stroke="#6896A8" stroke-width="2"/>
          <text x="325" y="478" class="mono" font-size="18" font-weight="700" fill="#6896A8">V1</text>
          <text x="325" y="507" class="sans caps" font-size="14" font-weight="700" fill="#F2F0E9">GROUNDED</text>

          <rect x="530" y="445" width="196" height="78" rx="14" fill="#11161A" stroke="#55D8FF" stroke-width="2"/>
          <text x="550" y="478" class="mono" font-size="18" font-weight="700" fill="#55D8FF">V2</text>
          <text x="550" y="507" class="sans caps" font-size="14" font-weight="700" fill="#F2F0E9">TESTED</text>

          <rect x="755" y="445" width="196" height="78" rx="14" fill="#11161A" stroke="#59E7C2" stroke-width="2"/>
          <text x="775" y="478" class="mono" font-size="18" font-weight="700" fill="#59E7C2">V3</text>
          <text x="775" y="507" class="sans caps" font-size="14" font-weight="700" fill="#F2F0E9">ADVERSARIAL</text>

          <rect x="980" y="445" width="196" height="78" rx="14" fill="#11161A" stroke="#42F59E" stroke-width="2"/>
          <text x="1000" y="478" class="mono" font-size="18" font-weight="700" fill="#42F59E">V4</text>
          <text x="1000" y="507" class="sans caps" font-size="14" font-weight="700" fill="#F2F0E9">OPERATIONAL</text>

      <text x="80" y="588" class="mono" font-size="18" fill="#87939C">INSTALL • FORK • VERIFY</text>
      <text x="1200" y="588" text-anchor="end" class="mono" font-size="18" fill="#42F59E">v0.1</text>

    </svg>
